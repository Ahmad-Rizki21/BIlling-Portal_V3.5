name: Docker CI/CD Pipeline

on:
  push:
    branches: ["main", "dev", "optimization/v5.0"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Tag Name
        id: slug
        run: |
          echo "tag=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> $GITHUB_OUTPUT
          echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.slug.outputs.repo }}-backend

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta-backend.outputs.tags }}
            ghcr.io/${{ steps.slug.outputs.repo }}-backend:${{ steps.slug.outputs.tag }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.slug.outputs.repo }}-frontend

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta-frontend.outputs.tags }}
            ghcr.io/${{ steps.slug.outputs.repo }}-frontend:${{ steps.slug.outputs.tag }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deployment Instruction Artifact
        run: |
          mkdir -p deploy
          cp docker-compose.yml deploy/
          echo "Run 'docker-compose pull && docker-compose up -d' on your server." > deploy/README_DEPLOY.md

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-deployment-files
          path: deploy/

  deploy-staging:
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/optimization/v5.0' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Tag Name
        id: slug
        run: |
          echo "tag=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> $GITHUB_OUTPUT
          echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Deploy to Local Staging VM
        run: |
          # Pastikan folder aplikasi ada
          mkdir -p ~/billing-staging

          # Salin docker-compose.yml terbaru dari repo ke folder staging
          cp docker-compose.yml ~/billing-staging/

          cd ~/billing-staging

          # Tentukan variabel untuk docker compose
          export IMAGE_TAG=${{ steps.slug.outputs.tag }}
          export REPO_NAME=${{ steps.slug.outputs.repo }}

          # Login ke GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Tarik image terbaru & jalankan (Gunakan variabel env agar docker-compose.yml bisa baca)
          IMAGE_TAG=$IMAGE_TAG REPO_NAME=$REPO_NAME docker compose pull
          IMAGE_TAG=$IMAGE_TAG REPO_NAME=$REPO_NAME docker compose up -d

          # Bersihkan image lama
          docker image prune -f
