version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: billing-db
    restart: always
    environment:
      MYSQL_DATABASE: jelantik_billing
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: billing-backend
    restart: always
    environment:
      - DATABASE_URL=mysql+aiomysql://root:${DATABASE_PASSWORD:-root}@db:3306/jelantik_billing
      - SECRET_KEY=${SECRET_KEY:-your_secret_key_here}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - XENDIT_API_URL=https://api.xendit.co/v2/invoices
      - XENDIT_API_KEY_JAKINET=${XENDIT_API_KEY_JAKINET}
      - XENDIT_API_KEY_JELANTIK=${XENDIT_API_KEY_JELANTIK}
      - XENDIT_CALLBACK_TOKEN_ARTACOMINDO=${XENDIT_CALLBACK_TOKEN_ARTACOMINDO}
      - XENDIT_CALLBACK_TOKEN_JELANTIK=${XENDIT_CALLBACK_TOKEN_JELANTIK}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALIBABA_CLOUD_API_KEY=${ALIBABA_CLOUD_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: billing-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
